<!-- Banner verde superior con punto parpadeante -->
<div class="top-banner">
  <span class="banner-dot"></span>
  Buenas tardes. Shoppers verificados disponibles ahora mismo
</div>

<nav class="navbar">
  <div class="navbar-container">

    <!-- Logo -->
    <a routerLink="/" class="brand">assist<span>ly</span></a>

    <!-- Botón hamburguesa para móvil -->
    <button class="hamburger" (click)="toggleMenu()">
      <span></span><span></span><span></span>
    </button>

    <!-- Links de navegación -->
    <div class="nav-links" [class.abierto]="menuAbierto">
      <a routerLink="/shoppers"  routerLinkActive="active" class="nav-link" (click)="menuAbierto=false">Solicitudes</a>
      <a routerLink="/solicitud" routerLinkActive="active" class="nav-link" (click)="menuAbierto=false">Shoppers</a>
      <a routerLink="/admin"     routerLinkActive="active" class="nav-link" (click)="menuAbierto=false">Por qué Assistly</a>
      <a routerLink="/"          routerLinkActive="active" class="nav-link" (click)="menuAbierto=false" [routerLinkActiveOptions]="{exact:true}">Cómo funciona</a>
    </div>

    <!-- Botones de la derecha -->
    <div class="nav-actions">

      <!-- Switch visual de modo oscuro/claro -->
      <label class="theme-switch" title="Cambiar tema">
        <input type="checkbox" [checked]="isDark" (change)="toggleTheme()" />
        <span class="switch-track"></span>
      </label>

      <a routerLink="/" class="nav-ghost" (click)="menuAbierto=false">Iniciar sesión</a>
      <a routerLink="/solicitud" class="btn-cta btn-cta--outline" (click)="menuAbierto=false">Ser shopper</a>
    </div>

  </div>
</nav>
